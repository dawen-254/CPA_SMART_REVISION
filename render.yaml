databases:
  - name: cpa_revision_db
    databaseName: cpa_revision
    user: cpa_user
    plan: free

services:
  - type: web
    name: cpa-smart-revision
    env: python
    plan: free
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cpa_revision_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.10.12"
